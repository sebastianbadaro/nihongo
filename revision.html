<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://esm.sh; frame-ancestors 'none'">
  <title>Revisión — 日本語 Quiz</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23B5281C'/><text x='50' y='70' text-anchor='middle' font-size='56' fill='white' font-family='serif'>学</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nihongo.css">
</head>
<body class="page-app">
<script>
(function(){
  const old = localStorage.getItem('darkMode');
  if (old !== null && !localStorage.getItem('nihongo_theme')) {
    localStorage.setItem('nihongo_theme', old === '1' ? 'dark' : 'light');
  }
  if (localStorage.getItem('nihongo_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>

<div class="container-card">

  <header>
    <a href="quiz.html" class="back-btn">← Volver al quiz</a>
    <h1 class="page-title">Revisión de preguntas</h1>
    <div class="page-subtitle">日本語 Quiz — Dekiru Nihongo</div>
  </header>

  <!-- Filters -->
  <div class="rev-filter-bar">
    <select id="unit-select" class="btn-ghost rev-select">
      <option value="all">Todas las unidades</option>
    </select>
    <input id="search" type="search" class="btn-ghost rev-search"
      placeholder="Buscar pregunta, respuesta u opción…">
    <select id="cat-select" class="btn-ghost rev-select">
      <option value="all">Todas las categorías</option>
    </select>
  </div>
  <div style="margin-bottom:var(--space-4)">
    <span id="counter" class="rev-counter">Cargando…</span>
  </div>

  <!-- States -->
  <div id="error-box" class="rev-error-box hidden"></div>

  <div id="loading" class="rev-state">
    <span class="rev-state-icon">⏳</span>
    <div class="rev-state-title">Cargando preguntas…</div>
  </div>

  <div id="empty" class="rev-state hidden">
    <span class="rev-state-icon">🔍</span>
    <div id="empty-title" class="rev-state-title">Sin resultados</div>
    <div id="empty-sub" class="rev-state-sub">Probá cambiando los filtros o la búsqueda.</div>
  </div>

  <div id="grid" class="rev-grid hidden"></div>
  <div id="sentinel" style="height:4px;margin-top:var(--space-4)"></div>

  <footer class="site-footer">
    Desarrollado por <a href="https://www.linkedin.com/in/sbadaro/" target="_blank" rel="noopener" class="footer-link">
      Sebastián Badaró
      <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.28 2.38 4.28 5.47v6.27zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/>
      </svg>
    </a>
  </footer>

</div>

<script>
const RevisionApp = {
  allQuestions:  [],
  filtered:      [],
  manifestUnits: [],
  loadedUnitIds: new Set(),
  isLoadingAll:  false,
  renderOffset:  0,
  PAGE_SIZE:     50,

  async init() {
    const unitSelect = document.getElementById('unit-select');
    const catSelect  = document.getElementById('cat-select');
    const searchEl   = document.getElementById('search');

    unitSelect.addEventListener('change', () => {
      catSelect.value = 'all';
      RevisionApp.applyFilters();
      RevisionApp.loadSelected();
    });
    catSelect.addEventListener('change', () => RevisionApp.applyFilters());
    searchEl.addEventListener('input', () => {
      if (unitSelect.value === 'all' && !RevisionApp.isLoadingAll) RevisionApp.loadSelected();
      RevisionApp.applyFilters();
    });

    new IntersectionObserver(
      entries => { if (entries[0].isIntersecting) RevisionApp.renderNextPage(); },
      { rootMargin: '400px' }
    ).observe(document.getElementById('sentinel'));

    try {
      const res = await fetch('./manifest.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { unidades = [] } = await res.json();
      RevisionApp.manifestUnits = unidades;

      unidades.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = `${u.nombre} — ${u.subtitle}`;
        unitSelect.appendChild(opt);
      });

    } catch (err) {
      RevisionApp.showError(
        `No se pudo cargar <code>manifest.json</code>: ${RevisionApp.esc(err.message)}<br><br>
         Corré un servidor local:<br>
         <code>python3 -m http.server 8000</code>
         → <code>http://localhost:8000/revision.html</code>`
      );
    } finally {
      document.getElementById('loading').classList.add('hidden');
      RevisionApp.applyFilters();
    }
  },

  async ensureUnitLoaded(unitId) {
    if (RevisionApp.loadedUnitIds.has(unitId)) return;
    const unit = RevisionApp.manifestUnits.find(u => u.id === unitId);
    if (!unit) return;

    const res = await fetch(unit.file);
    if (!res.ok) throw new Error(`HTTP ${res.status} al cargar ${unit.file}`);
    const questions = await res.json();
    questions.forEach((q, i) => {
      RevisionApp.allQuestions.push({
        unitId:   unit.id,
        unitName: unit.nombre,
        qid:      q.id || (unit.id.toUpperCase() + '-' + String(i + 1).padStart(3, '0')),
        cat:      q.cat  || '—',
        q:        q.q    || '',
        correct:  (Array.isArray(q.opts) ? (q.opts.find(o => o.correct === true) || {}).text : '') || '',
        opts:     Array.isArray(q.opts) ? q.opts : [],
      });
    });
    RevisionApp.loadedUnitIds.add(unitId);
  },

  async loadSelected() {
    const unitVal = document.getElementById('unit-select').value;

    if (unitVal !== 'all') {
      if (RevisionApp.loadedUnitIds.has(unitVal)) return;
      try {
        await RevisionApp.ensureUnitLoaded(unitVal);
      } catch (err) { RevisionApp.showError(RevisionApp.esc(err.message)); }
      RevisionApp.applyFilters();
      return;
    }

    if (RevisionApp.isLoadingAll) return;
    const unloaded = RevisionApp.manifestUnits.filter(u => !RevisionApp.loadedUnitIds.has(u.id));
    if (unloaded.length === 0) return;

    RevisionApp.isLoadingAll = true;
    for (const unit of unloaded) {
      RevisionApp.setCounter(`Cargando ${unit.nombre}…`);
      try { await RevisionApp.ensureUnitLoaded(unit.id); } catch (err) { RevisionApp.showError(RevisionApp.esc(err.message)); }
      RevisionApp.applyFilters();
    }
    RevisionApp.isLoadingAll = false;
  },

  applyFilters() {
    const unitSelect = document.getElementById('unit-select');
    const catSelect  = document.getElementById('cat-select');
    const searchEl   = document.getElementById('search');
    const gridEl     = document.getElementById('grid');
    const loadingEl  = document.getElementById('loading');
    const emptyEl    = document.getElementById('empty');
    const emptyTitle = document.getElementById('empty-title');
    const emptySub   = document.getElementById('empty-sub');

    const unitVal   = unitSelect.value;
    const catVal    = catSelect.value;
    const searchVal = searchEl.value.trim().toLowerCase();

    if (unitVal !== 'all' && !RevisionApp.loadedUnitIds.has(unitVal)) {
      loadingEl.classList.remove('hidden');
      emptyEl.classList.add('hidden');
      gridEl.classList.add('hidden');
      RevisionApp.setCounter('Cargando…');
      return;
    }
    loadingEl.classList.add('hidden');

    RevisionApp.rebuildCatSelect(unitVal);

    const pool = unitVal === 'all'
      ? RevisionApp.allQuestions
      : RevisionApp.allQuestions.filter(q => q.unitId === unitVal);

    RevisionApp.filtered = pool.filter(q => {
      if (catVal !== 'all' && q.cat !== catVal) return false;
      if (searchVal) {
        const optTexts = q.opts.map(o => typeof o === 'object' ? (o.text || '') + ' ' + (o.explanation || '') : o);
        const hay = [q.q, q.correct, ...optTexts].join(' ').toLowerCase();
        if (!hay.includes(searchVal)) return false;
      }
      return true;
    });

    const loaded = RevisionApp.loadedUnitIds.size;
    const total  = RevisionApp.manifestUnits.length;
    if (loaded === 0) {
      RevisionApp.setCounter('Seleccioná una unidad para comenzar');
    } else if (loaded < total && unitVal === 'all') {
      RevisionApp.setCounter(`${RevisionApp.filtered.length.toLocaleString()} preguntas · ${loaded}/${total} unidades cargadas`);
    } else {
      RevisionApp.setCounter(`${RevisionApp.filtered.length.toLocaleString()} de ${RevisionApp.allQuestions.length.toLocaleString()} preguntas`);
    }

    RevisionApp.renderOffset = 0;
    gridEl.innerHTML = '';

    if (RevisionApp.filtered.length === 0) {
      emptyEl.classList.remove('hidden');
      gridEl.classList.add('hidden');
      if (loaded === 0) {
        emptyTitle.textContent = 'Seleccioná una unidad para comenzar';
        emptySub.textContent   = 'Las preguntas se cargan bajo demanda.';
      } else {
        emptyTitle.textContent = 'Sin resultados';
        emptySub.textContent   = 'Probá cambiando los filtros o la búsqueda.';
      }
      return;
    }

    emptyEl.classList.add('hidden');
    gridEl.classList.remove('hidden');
    RevisionApp.renderNextPage();
  },

  rebuildCatSelect(unitVal) {
    const catSelect = document.getElementById('cat-select');
    const current   = catSelect.value;
    const pool      = unitVal === 'all'
      ? RevisionApp.allQuestions
      : RevisionApp.allQuestions.filter(q => q.unitId === unitVal);
    const cats = [...new Set(pool.map(q => q.cat))].sort((a, b) => a.localeCompare(b));

    catSelect.innerHTML = '<option value="all">Todas las categorías</option>';
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      if (c === current) opt.selected = true;
      catSelect.appendChild(opt);
    });
  },

  renderNextPage() {
    const gridEl = document.getElementById('grid');
    if (RevisionApp.renderOffset >= RevisionApp.filtered.length) return;
    const q    = document.getElementById('search').value.trim().toLowerCase();
    const page = RevisionApp.filtered.slice(RevisionApp.renderOffset, RevisionApp.renderOffset + RevisionApp.PAGE_SIZE);
    page.forEach(item => gridEl.appendChild(RevisionApp.buildCard(item, q)));
    RevisionApp.renderOffset += page.length;
  },

  buildCard(item, searchVal) {
    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'card-header-row';
    header.innerHTML = `
      <div class="card-badges">
        <span class="unit-badge">${RevisionApp.esc(item.unitName)}</span>
        <span class="cat-badge">${RevisionApp.esc(item.cat)}</span>
      </div>
      <span class="q-num">${item.qid}</span>
    `;

    const question = document.createElement('div');
    question.className = 'question-text jp';
    question.innerHTML = RevisionApp.highlight(item.q, searchVal);

    const opts = document.createElement('div');
    opts.className = 'opts-list';
    item.opts.forEach(opt => opts.appendChild(RevisionApp.buildOption(opt, item.correct, searchVal)));

    card.appendChild(header);
    card.appendChild(question);
    card.appendChild(opts);
    return card;
  },

  buildOption(opt, correct, searchVal) {
    const el        = document.createElement('div');
    const optText   = typeof opt === 'object' ? (opt.text        || '') : opt;
    const optExpl   = typeof opt === 'object' ? (opt.explanation || '') : '';
    const isCorrect = typeof opt === 'object' ? opt.correct === true : opt === correct;

    el.className = isCorrect ? 'opt-correct' : 'opt-wrong';

    const icon = document.createElement('span');
    icon.className = 'opt-icon';
    icon.textContent = isCorrect ? '✓' : '○';

    const body = document.createElement('div');
    body.className = 'opt-body';

    const text = document.createElement('span');
    text.className = 'opt-text jp';
    text.innerHTML = RevisionApp.highlight(optText, searchVal);
    body.appendChild(text);

    if (optExpl) {
      const reason = document.createElement('span');
      reason.className = 'opt-reason';
      reason.innerHTML = RevisionApp.highlight(optExpl, searchVal);
      body.appendChild(reason);
    }

    el.appendChild(icon);
    el.appendChild(body);
    return el;
  },

  esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  },

  highlight(text, query) {
    const escaped = RevisionApp.esc(text);
    if (!query) return escaped;
    const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
  },

  showError(html) {
    const box = document.getElementById('error-box');
    box.innerHTML = `<strong>Error al cargar datos</strong><br>${html}`;
    box.classList.remove('hidden');
  },

  setCounter(text) {
    const el = document.getElementById('counter');
    if (el) el.textContent = text;
  },
};

RevisionApp.init();
</script>
<script src="config.js"></script>
<script src="supabase-client.js"></script>
<script src="nav.js"></script>
</body>
</html>
