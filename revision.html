<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisión — 日本語 Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink-bg: #F2EDE3;
      --ink-surface: #FEFCF6;
      --ink-card: #F8F4EC;
      --ink-border: #DDD5C4;
      --ink-red: #B5281C;
      --ink-gold: #C4962A;
      --ink-muted: #79726A;
    }
    .jp { font-family: 'Noto Serif JP', "Hiragino Sans", "Yu Gothic", "Meiryo", "MS Gothic", serif; }
    mark { background: #FBF4E5; color: #7A5C0E; border-radius: 2px; padding: 0 2px; }

    /* ── Light mode overrides ── */
    body { background-color: var(--ink-bg) !important; font-family: 'Noto Sans JP', sans-serif; }
    header { background-color: var(--ink-surface) !important; border-color: #E2D9C8 !important; }
    h1 { font-family: 'Lora', Georgia, serif; color: var(--ink-red) !important; }
    #counter { background-color: var(--ink-card) !important; color: var(--ink-muted) !important; }
    #dark-btn, #back-link {
      border-color: #DDD5C4 !important;
      background-color: var(--ink-surface) !important;
      color: var(--ink-muted) !important;
    }
    #dark-btn:hover, #back-link:hover { border-color: var(--ink-red) !important; color: var(--ink-red) !important; }
    select, input[type="search"] {
      background-color: var(--ink-surface) !important;
      border-color: #DDD5C4 !important;
    }
    select:focus, input[type="search"]:focus {
      --tw-ring-color: #B5281C !important;
      border-color: var(--ink-red) !important;
    }
    .card {
      background-color: var(--ink-surface) !important;
      border-color: var(--ink-border) !important;
    }
    .question-text { color: #1C1917 !important; }
    .unit-badge {
      background-color: #FBF4E5 !important;
      color: var(--ink-gold) !important;
      font-weight: 700;
    }
    .cat-badge {
      background-color: #FDF0EE !important;
      color: var(--ink-red) !important;
      font-weight: 700;
    }
    .q-num { color: var(--ink-muted) !important; }
    .opt-correct { background-color: #EBF7EE !important; border-color: #2D9348 !important; }
    .opt-correct .opt-icon { color: #2D9348 !important; }
    .opt-correct .opt-text { color: #1A5C2E !important; }
    .opt-wrong { background-color: var(--ink-card) !important; border-color: var(--ink-border) !important; }
    .opt-wrong .opt-icon { color: #C4C0B8 !important; }
    .opt-wrong .opt-text { color: var(--ink-muted) !important; }

    /* ── Dark mode ── */
    body.dark { background-color: #100F0D !important; color: #E8E0D0; }
    body.dark header { background-color: #1C1A17 !important; border-color: #2E2A23 !important; }
    body.dark h1 { color: #E05A45 !important; }
    body.dark #counter { background-color: #231F1B !important; color: #8A8278 !important; }
    body.dark #dark-btn, body.dark #back-link {
      background-color: #231F1B !important;
      border-color: #3A3530 !important;
      color: #8A8278 !important;
    }
    body.dark select, body.dark input[type="search"] {
      background-color: #231F1B !important;
      border-color: #3A3530 !important;
      color: #E8E0D0 !important;
      color-scheme: dark;
    }
    body.dark #loading, body.dark #empty { color: #8A8278; }
    body.dark .card { background-color: #1C1A17 !important; border-color: #3A3530 !important; }
    body.dark .question-text { color: #E8E0D0 !important; }
    body.dark .unit-badge { background-color: rgba(196,150,42,0.15) !important; color: #D4A840 !important; }
    body.dark .cat-badge  { background-color: rgba(224,90,69,0.15) !important; color: #F0A090 !important; }
    body.dark .q-num { color: #5A5550 !important; }
    body.dark .opt-correct { background-color: rgba(45,147,72,0.15) !important; border-color: #2D9348 !important; }
    body.dark .opt-correct .opt-icon { color: #4ade80 !important; }
    body.dark .opt-correct .opt-text { color: #86efac !important; }
    body.dark .opt-wrong { background-color: rgba(58,53,48,0.5) !important; border-color: #3A3530 !important; }
    body.dark .opt-wrong .opt-icon { color: #4A4540 !important; }
    body.dark .opt-wrong .opt-text { color: #8A8278 !important; }
    body.dark mark { background: #251F0E; color: #D4A840; }
    body.dark .opt-reason { opacity: 0.75; }
    body.dark .opt-correct .opt-reason { color: #86efac !important; }
    body.dark .opt-wrong   .opt-reason { color: #5A5550 !important; }
  </style>
</head>
<body class="min-h-screen transition-colors duration-200">
<script>
  if (localStorage.getItem('darkMode') === '1') document.body.classList.add('dark');
</script>

  <!-- HEADER + FILTROS (sticky) -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20 transition-colors duration-200">
    <div class="max-w-7xl mx-auto px-4 py-3 space-y-3">

      <div class="flex items-center justify-between gap-4">
        <div style="padding-left:46px">
          <h1 class="text-lg font-bold text-red-700 leading-tight">日本語 Quiz — Revisión de preguntas</h1>
          <p class="text-xs text-gray-400">Dekiru Nihongo</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span id="counter"
            class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full whitespace-nowrap">
            Cargando…
          </span>
          <button id="dark-btn" onclick="toggleDark()" title="Modo nocturno"
            class="border border-gray-300 rounded-full w-9 h-9 flex items-center justify-center text-base bg-white text-gray-500 hover:border-gray-400 transition-colors">
          </button>
          <a id="back-link" href="quiz.html" title="Volver al quiz"
            class="border border-gray-300 rounded-full px-3 py-1 text-sm bg-white text-gray-500 hover:border-gray-400 transition-colors whitespace-nowrap">
            ← Quiz
          </a>
        </div>
      </div>

      <div class="flex flex-wrap gap-2">
        <select id="unit-select"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-red-300 min-w-[200px]">
          <option value="all">📚 Todas las unidades</option>
        </select>

        <input id="search" type="search" placeholder="🔍  Buscar pregunta, respuesta u opción…"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-red-300 flex-1 min-w-[240px]">

        <select id="cat-select"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-red-300 min-w-[200px]">
          <option value="all">🏷  Todas las categorías</option>
        </select>
      </div>

    </div>
  </header>

  <!-- CONTENIDO -->
  <main class="max-w-7xl mx-auto px-4 py-6">

    <div id="error-box"
      class="hidden bg-red-50 border border-red-200 text-red-800 rounded-xl p-4 mb-5 text-sm leading-relaxed">
    </div>

    <div id="loading" class="text-center py-24 text-gray-400">
      <div class="text-4xl mb-3 animate-pulse">⏳</div>
      <div class="text-base">Cargando preguntas…</div>
    </div>

    <div id="empty" class="hidden text-center py-24 text-gray-400">
      <div class="text-5xl mb-4">🔍</div>
      <div id="empty-title" class="text-lg font-medium">Sin resultados</div>
      <div id="empty-sub" class="text-sm mt-1">Probá cambiando los filtros o la búsqueda.</div>
    </div>

    <div id="grid" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
    <div id="sentinel" class="h-4 mt-4"></div>

  </main>

  <script>
  // ================================================================
  // DARK MODE
  // ================================================================
  function toggleDark() {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('dark-btn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('darkMode', isDark ? '1' : '0');
  }

  document.getElementById('dark-btn').textContent =
    document.body.classList.contains('dark') ? '☀️' : '🌙';

  // ================================================================
  // ESTADO
  // ================================================================
  let allQuestions  = [];
  let filtered      = [];
  let manifestUnits = [];
  let loadedUnitIds = new Set();
  let isLoadingAll  = false;
  let renderOffset  = 0;
  const PAGE_SIZE   = 50;

  const unitSelect = document.getElementById('unit-select');
  const catSelect  = document.getElementById('cat-select');
  const searchEl   = document.getElementById('search');
  const counterEl  = document.getElementById('counter');
  const gridEl     = document.getElementById('grid');
  const loadingEl  = document.getElementById('loading');
  const emptyEl    = document.getElementById('empty');
  const errorBox   = document.getElementById('error-box');
  const emptyTitle = document.getElementById('empty-title');
  const emptySub   = document.getElementById('empty-sub');

  // ================================================================
  // CARGA PEREZOSA
  // ================================================================
  async function init() {
    try {
      const res = await fetch('./manifest.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { unidades = [] } = await res.json();
      manifestUnits = unidades;

      unidades.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = `${u.nombre} — ${u.subtitle}`;
        unitSelect.appendChild(opt);
      });

    } catch (err) {
      showError(
        `No se pudo cargar <code class="bg-red-100 px-1 rounded">manifest.json</code>: ${esc(err.message)}<br><br>
         Corré un servidor local:<br>
         <code class="bg-red-100 px-1 rounded">python3 -m http.server 8000</code>
         → <code class="bg-red-100 px-1 rounded">http://localhost:8000/revision.html</code>`
      );
    } finally {
      loadingEl.classList.add('hidden');
      applyFilters();
    }
  }

  async function ensureUnitLoaded(unitId) {
    if (loadedUnitIds.has(unitId)) return;
    const unit = manifestUnits.find(u => u.id === unitId);
    if (!unit) return;

    const res = await fetch(unit.file);
    if (!res.ok) throw new Error(`HTTP ${res.status} al cargar ${unit.file}`);
    const questions = await res.json();
    questions.forEach((q, i) => {
      allQuestions.push({
        unitId:      unit.id,
        unitName:    unit.nombre,
        qid:         q.id          || (unit.id.toUpperCase() + '-' + String(i + 1).padStart(3, '0')),
        cat:         q.cat         || '—',
        q:           q.q           || '',
        correct:     (Array.isArray(q.opts) ? (q.opts.find(o => o.correct === true) || {}).text : '') || '',
        opts:        Array.isArray(q.opts) ? q.opts : [],
      });
    });
    loadedUnitIds.add(unitId);
  }

  async function loadSelected() {
    const unitVal = unitSelect.value;

    if (unitVal !== 'all') {
      if (loadedUnitIds.has(unitVal)) return;
      try {
        await ensureUnitLoaded(unitVal);
      } catch (err) { showError(esc(err.message)); }
      applyFilters();
      return;
    }

    // "Todas" — carga progresiva unidad por unidad
    if (isLoadingAll) return;
    const unloaded = manifestUnits.filter(u => !loadedUnitIds.has(u.id));
    if (unloaded.length === 0) return;

    isLoadingAll = true;
    for (const unit of unloaded) {
      setCounter(`Cargando ${unit.nombre}…`);
      try { await ensureUnitLoaded(unit.id); } catch (err) { showError(esc(err.message)); }
      applyFilters();
    }
    isLoadingAll = false;
  }

  // ================================================================
  // FILTROS
  // ================================================================
  function applyFilters() {
    const unitVal   = unitSelect.value;
    const catVal    = catSelect.value;
    const searchVal = searchEl.value.trim().toLowerCase();

    // Unidad específica aún no cargada → mostrar spinner
    if (unitVal !== 'all' && !loadedUnitIds.has(unitVal)) {
      loadingEl.classList.remove('hidden');
      emptyEl.classList.add('hidden');
      gridEl.classList.add('hidden');
      setCounter('Cargando…');
      return;
    }
    loadingEl.classList.add('hidden');

    rebuildCatSelect(unitVal);

    const pool = unitVal === 'all'
      ? allQuestions
      : allQuestions.filter(q => q.unitId === unitVal);

    filtered = pool.filter(q => {
      if (catVal !== 'all' && q.cat !== catVal) return false;
      if (searchVal) {
        const optTexts = q.opts.map(o => typeof o === 'object' ? (o.text || '') + ' ' + (o.explanation || '') : o);
        const hay = [q.q, q.correct, ...optTexts].join(' ').toLowerCase();
        if (!hay.includes(searchVal)) return false;
      }
      return true;
    });

    const loaded = loadedUnitIds.size;
    const total  = manifestUnits.length;
    if (loaded === 0) {
      setCounter('Seleccioná una unidad para comenzar');
    } else if (loaded < total && unitVal === 'all') {
      setCounter(`${filtered.length.toLocaleString()} preguntas · ${loaded}/${total} unidades cargadas`);
    } else {
      setCounter(`${filtered.length.toLocaleString()} de ${allQuestions.length.toLocaleString()} preguntas`);
    }

    renderOffset = 0;
    gridEl.innerHTML = '';

    if (filtered.length === 0) {
      emptyEl.classList.remove('hidden');
      gridEl.classList.add('hidden');
      if (loaded === 0) {
        emptyTitle.textContent = 'Seleccioná una unidad para comenzar';
        emptySub.textContent   = 'Las preguntas se cargan bajo demanda.';
      } else {
        emptyTitle.textContent = 'Sin resultados';
        emptySub.textContent   = 'Probá cambiando los filtros o la búsqueda.';
      }
      return;
    }

    emptyEl.classList.add('hidden');
    gridEl.classList.remove('hidden');
    renderNextPage();
  }

  function rebuildCatSelect(unitVal) {
    const current = catSelect.value;
    const pool    = unitVal === 'all' ? allQuestions : allQuestions.filter(q => q.unitId === unitVal);
    const cats    = [...new Set(pool.map(q => q.cat))].sort((a, b) => a.localeCompare(b));

    catSelect.innerHTML = '<option value="all">🏷  Todas las categorías</option>';
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      if (c === current) opt.selected = true;
      catSelect.appendChild(opt);
    });
  }

  // ================================================================
  // RENDER PAGINADO + INFINITE SCROLL
  // ================================================================
  function renderNextPage() {
    if (renderOffset >= filtered.length) return;
    const q    = searchEl.value.trim().toLowerCase();
    const page = filtered.slice(renderOffset, renderOffset + PAGE_SIZE);
    page.forEach(item => gridEl.appendChild(buildCard(item, q)));
    renderOffset += page.length;
  }

  new IntersectionObserver(
    entries => { if (entries[0].isIntersecting) renderNextPage(); },
    { rootMargin: '400px' }
  ).observe(document.getElementById('sentinel'));

  function buildCard(item, searchVal) {
    const card = document.createElement('div');
    card.className = 'card bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow flex flex-col gap-3 p-4';

    const header = document.createElement('div');
    header.className = 'flex items-start justify-between gap-2';
    header.innerHTML = `
      <div class="flex flex-wrap gap-1.5">
        <span class="unit-badge text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">${esc(item.unitName)}</span>
        <span class="cat-badge text-xs font-semibold bg-violet-100 text-violet-700 px-2 py-0.5 rounded-full">${esc(item.cat)}</span>
      </div>
      <span class="q-num text-xs font-mono text-gray-400 whitespace-nowrap">${item.qid}</span>
    `;

    const question = document.createElement('div');
    question.className = 'question-text jp text-base font-semibold text-gray-800 leading-snug';
    question.innerHTML = highlight(item.q, searchVal);

    const opts = document.createElement('div');
    opts.className = 'flex flex-col gap-1.5';
    item.opts.forEach(opt => opts.appendChild(buildOption(opt, item.correct, searchVal)));

    card.appendChild(header);
    card.appendChild(question);
    card.appendChild(opts);

    return card;
  }

  function buildOption(opt, correct, searchVal) {
    const el = document.createElement('div');
    const optText    = typeof opt === 'object' ? (opt.text   || '') : opt;
    const optExplanation = typeof opt === 'object' ? (opt.explanation || '') : '';
    const isCorrect  = typeof opt === 'object' ? opt.correct === true : opt === correct;

    el.className = isCorrect
      ? 'opt-correct flex items-start gap-2 bg-green-50 border border-green-300 rounded-lg px-3 py-1.5'
      : 'opt-wrong flex items-start gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5';

    const icon = document.createElement('span');
    icon.className = isCorrect
      ? 'opt-icon text-green-600 font-bold text-sm shrink-0 mt-0.5'
      : 'opt-icon text-gray-300 text-sm shrink-0 mt-0.5';
    icon.textContent = isCorrect ? '✓' : '○';

    const body = document.createElement('div');
    body.className = 'flex flex-col gap-0.5';

    const text = document.createElement('span');
    text.className = isCorrect
      ? 'opt-text jp text-sm font-semibold text-green-800'
      : 'opt-text jp text-sm text-gray-500';
    text.innerHTML = highlight(optText, searchVal);
    body.appendChild(text);

    if (optExplanation) {
      const reason = document.createElement('span');
      reason.className = isCorrect
        ? 'opt-reason text-xs text-green-700 opacity-80'
        : 'opt-reason text-xs text-gray-400';
      reason.innerHTML = highlight(optExplanation, searchVal);
      body.appendChild(reason);
    }

    el.appendChild(icon);
    el.appendChild(body);
    return el;
  }

  // ================================================================
  // HELPERS
  // ================================================================
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function highlight(text, query) {
    const escaped = esc(text);
    if (!query) return escaped;
    const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
  }

  function showError(html) {
    errorBox.innerHTML = `<b>⚠️ Error</b><br>${html}`;
    errorBox.classList.remove('hidden');
  }

  function setCounter(text) { counterEl.textContent = text; }

  // ================================================================
  // EVENTOS
  // ================================================================
  unitSelect.addEventListener('change', () => {
    catSelect.value = 'all';
    applyFilters();
    loadSelected();
  });
  catSelect.addEventListener('change', applyFilters);
  searchEl.addEventListener('input', () => {
    if (unitSelect.value === 'all' && !isLoadingAll) loadSelected();
    applyFilters();
  });

  // ================================================================
  // INICIO
  // ================================================================
  init();
  </script>
<script src="nav.js"></script>
</body>
</html>
