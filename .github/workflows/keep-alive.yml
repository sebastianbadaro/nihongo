# keep-alive.yml
#
# PURPOSE:
#   Free-tier Supabase projects pause after 1 week of inactivity.
#   This workflow runs a tiny query against the `progress` table every 3 days
#   to keep the database (and project) awake without any manual intervention.
#
# NOTE:
#   We query a real table (/rest/v1/progress?select=count), NOT the REST root
#   (/rest/v1/). The root endpoint now rejects the anon key with 401
#   ("Only the service_role API key can be used for this endpoint"), so it
#   cannot be used here — and a real query also exercises the DB, which is what
#   actually prevents the project from pausing.
#
# REQUIRED SECRETS (add at GitHub → repo Settings → Secrets and variables → Actions):
#   SUPABASE_URL      — your project URL, e.g. https://abcdefgh.supabase.co
#   SUPABASE_ANON_KEY — your project anon key (safe to use here; RLS enforces security)
#
# MANUAL RUN:
#   Go to Actions → "Keep Supabase Active" → "Run workflow" to trigger immediately.

name: Keep Supabase Active

on:
  schedule:
    # Runs at 00:00 UTC on days 1, 4, 7, 10, 13, 16, 19, 22, 25, 28
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase health endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping a table endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing secrets: set SUPABASE_URL and SUPABASE_ANON_KEY in"
            echo "repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          BASE="${SUPABASE_URL%/}"                      # strip any trailing slash
          ENDPOINT="$BASE/rest/v1/progress?select=count"
          echo "Pinging $ENDPOINT ..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$ENDPOINT" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Unexpected status $HTTP_STATUS."
            echo "If 401: verify the secrets are correct. The anon key works on table"
            echo "endpoints but NOT on the REST root (/rest/v1/), which needs service_role."
            exit 1
          fi
          echo "Supabase project is active."
